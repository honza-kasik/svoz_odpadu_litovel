name: Refresh generated site

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install icalendar Pillow

      - name: Regenerate site
        run: python generator_svozu_odpadu.py

      - name: Run tests
        run: python tests.py

      - name: Commit generated changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ulice calendars waste_schedule.csv sitemap.xml resources/social
          git commit -m "Refresh generated site previews"
          git push
