name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install icalendar

      - name: Run tests
        run: python tests.py

      - name: Validate exception JSON
        run: |
          python - <<'PY'
          from lokace_svozu import WasteType
          from svoz_exceptions import load_svoz_exceptions

          load_svoz_exceptions(
              allowed_waste_types={waste_type.name for waste_type in WasteType}
          )
          PY

      - name: Compile Python files
        run: python -m py_compile lokace_svozu.py svoz_exceptions.py tests.py scripts/watch_litovel_eu.py
